name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Dummy values so env validation and Prisma generation succeed. No CI
      # step connects to a database — unit/component tests exercise the pure
      # services, and the Playwright specs run against public routes only.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/exfocus"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/exfocus"
      AUTH_SECRET: "ci-placeholder-secret-value-000000000000"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit & component tests
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
